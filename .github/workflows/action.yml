name: Backend CI/CD — Build, Push y Deploy EC2

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Obtener código fuente
      - name: Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Docker Buildx (necesario para multi-stage)
      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login en Docker Hub con secrets
      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Construir y publicar imagen multi-stage
      - name: Build y Push imagen backend
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devops_back:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devops_back:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 5. Deploy en EC2 Backend via SSH
      - name: Deploy en EC2 Backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACK_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Login en Docker Hub desde EC2
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # Bajar imagen actualizada
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/devops_back:latest

            # Detener y eliminar contenedor anterior si existe
            docker stop backend || true
            docker rm backend || true

            # Levantar nuevo contenedor (MySQL se gestiona por separado con docker-compose)
            docker run -d \
              --name backend \
              --restart unless-stopped \
              -p 3000:3000 \
              -e PORT=3000 \
              -e DB_HOST="${{ secrets.DB_HOST }}" \
              -e DB_PORT=3306 \
              -e DB_USER="${{ secrets.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e DB_NAME="${{ secrets.DB_NAME }}" \
              ${{ secrets.DOCKERHUB_USERNAME }}/devops_back:latest

            # Verificar que el contenedor está corriendo
            docker ps | grep backend
